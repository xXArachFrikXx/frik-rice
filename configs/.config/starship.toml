format = """
$username$hostname $directory$git_branch$git_status$cmd_duration
$character"""

[username]
format = "[$user]($style)"
style_user = "bold #f68500"
show_always = true

[hostname]
format = "[@$hostname]($style) "
style = "bold #f68500"
ssh_only = false

[directory]
format = "[in $path]($style) "
style = "bold cyan"
truncate_to_repo = false
truncation_length = 3

[git_branch]
format = "[$symbol$branch]($style) "
style = "bold purple"
symbol = " "

[git_status]
format = '([$all_status$ahead_behind]($style) )'
style = "bold red"

[cmd_duration]
format = "[took $duration]($style) "
style = "yellow"
min_time = 500

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"

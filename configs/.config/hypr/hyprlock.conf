# hyprlock.conf — Lock screen configuration
# Colors are sourced from colors.conf, which is generated by matugen.
# This means the lock screen automatically matches your current wallpaper theme.
# See: https://wiki.hypr.land/Hypr-Ecosystem/hyprlock/

source = colors.conf  # Load matugen-generated Material Design 3 color variables

general {
    grace              = 1     # Seconds before lock is enforced (allows quick unlock after trigger)
    fractional_scaling = 2     # Enable fractional scaling support
    immediate_render   = true  # Render the lock screen immediately instead of waiting for first frame
}

background {
    monitor =  # Empty = apply to all monitors
    path    = ~/.config/hypr/current_wallpaper  # Symlink updated by wppicker.sh
    color   = rgb(0,0,0)  # Fallback color shown before wallpaper loads

    # Blur settings (same keys as hyprland decoration.blur)
    blur_size       = 3
    blur_passes     = 2     # 0 = no blur
    noise           = 0.0117
    contrast        = 1.3000
    brightness      = 0.6000
    vibrancy        = 0.2100
    vibrancy_darkness = 0.0
}

# === CLOCK — HOURS ===
label {
    monitor =
    text        = cmd[update:1000] echo "<b><big> $(date +"%H") </big></b>"  # Updates every second
    color       = $on_secondary_container  # From matugen colors
    font_size   = 112
    font_family = Adwaita Sans
    shadow_passes = 0
    shadow_size   = 0
    position  = 0, 220
    halign    = center
    valign    = center
}

# === CLOCK — MINUTES ===
label {
    monitor =
    text        = cmd[update:1000] echo "<b><big> $(date +"%M") </big></b>"
    color       = $on_secondary_container
    font_size   = 112
    font_family = Adwaita Sans
    shadow_passes = 0
    shadow_size   = 0
    position  = 0, 80
    halign    = center
    valign    = center
}

# === DATE — DAY NAME ===
label {
    monitor =
    text        = cmd[update:18000000] echo "<b><big> $(date +'%A') </big></b>"  # Updates every 5 hours
    color       = $secondary
    font_size   = 18
    font_family = JetBrainsMono NFM
    position  = 0, -15
    halign    = center
    valign    = center
}

# === DATE — DAY + MONTH ===
label {
    monitor =
    text        = cmd[update:18000000] echo "<b> $(date +'%d %b') </b>"
    color       = $secondary
    font_size   = 14
    font_family = JetBrainsMono Nerd Font
    position  = 0, -40
    halign    = center
    valign    = center
}

# === PASSWORD INPUT FIELD ===
input-field {
    monitor =
    size = 250, 50

    outline_thickness = 3

    dots_size     = 0.26   # Size of password dots relative to field height
    dots_spacing  = 0.64   # Spacing between dots
    dots_center   = true
    dots_rounding = -1     # -1 = match field rounding

    rounding    = 22
    outer_color = $source_color  # Border color from matugen (your wallpaper's dominant color)
    inner_color = rgba(255, 255, 255, 0.1)
    font_color  = $secondary
    fade_on_empty   = true
    placeholder_text = <i>Password...</i>

    position = 0, 120
    halign   = center
    valign   = bottom
}
